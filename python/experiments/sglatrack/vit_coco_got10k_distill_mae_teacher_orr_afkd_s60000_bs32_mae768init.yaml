# 同 vit_coco_got10k_distill_mae_teacher_orr_afkd_s60000_bs32，但 Student 初始化改為
# MAE ViT-Base (768-dim) 投影至 32-dim，與 Teacher 768 維度空間對齊。
#
# Student：vit_CARE_relu6_dim32（embed_dim=32）；Teacher：768-dim base ViT ckpt。
# PRETRAIN_FILE：mae_pretrain_vit_base.pth（768 → 32 左上角截斷投影，見 vit_CARE_relu6_dim32.py）。
# TEACHER_PRETRAIN_FILE / PRETRAIN_FILE：PRETRAIN_FILE 相對 pretrained_models/；
# TEACHER_PRETRAIN_FILE 相對於執行 train 時的 cwd（一般為 python/）。
DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
    - 0.485
    - 0.456
    - 0.406
  SEARCH:
    CENTER_JITTER: 4.5
    FACTOR: 5.0
    SCALE_JITTER: 0.5
    SIZE: 256
    NUMBER: 1
  STD:
    - 0.229
    - 0.224
    - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 1

  TRAIN:
    DATASETS_NAME:
      - COCO17
      - GOT10K_train_full
    DATASETS_RATIO:
      - 1
      - 1
    SAMPLE_PER_EPOCH: 60000

  VAL:
    DATASETS_NAME:
      - GOT10K_votval
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 10000

MODEL:
  PRETRAIN_FILE: "mae_pretrain_vit_base.pth"
  IS_DISTILL: True
  TEACHER_TYPE: "sglatrack"
  TEACHER_PRETRAIN_FILE: "output/checkpoints/train/sglatrack/vit_coco_got10k_distill_mae_teacher/sglatrack_ep0050.pth.tar"
  TEACHER_BACKBONE_TYPE: "vit_base_patch16_224"
  ORR_ENABLE: True
  ORR_RANDOM_MASK: False
  ORR_BLOCK_SZ: 16
  ORR_MASK_RATIO: 0.3
  ORR_GAUSSIAN_SIGMA: 64
  EXTRA_MERGER: False
  RETURN_INTER: False
  RETURN_STAGES: []
  BACKBONE:
    TYPE: vit_care_relu6_dim32_base_patch16_224
    STRIDE: 16
    MID_PE: False
    SEP_SEG: False
    CAT_MODE: 'direct'
    MERGE_LAYER: 0
    ADD_CLS_TOKEN: False
    CLS_TOKEN_USE_MODE: 'ignore'
    CE_LOC: []
    CE_KEEP_RATIO: []
    CE_TEMPLATE_RANGE: 'ALL'
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 32
  EPOCH: 50
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 5e-5
  LR_BACKBONE: 5e-6
  LR_DROP_EPOCH: 40
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 5
  WEIGHT_DECAY: 0.0001
  AMP: True
  CE_START_EPOCH: 20
  CE_WARM_EPOCH: 80
  FREEZE_LAYERS: []
  DISTILL_LOSS_WEIGHT: 0.0002
  AFKD_TAU0: 10.0
  AFKD_RHO: 10.0
  SIM_LOSS_WEIGHT: 0.0002

TEST:
  EPOCH: 50
  SEARCH_FACTOR: 5.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
