# Student: MAE ViT-B + feature distill from a trained sglatrack .pth.tar (e.g. epoch 50).
# Set TEACHER_PRETRAIN_FILE to your teacher checkpoint (relative to python/ working dir or absolute).
# Teacher should use the same backbone / template-search sizes as this yaml.
DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
    - 0.485
    - 0.456
    - 0.406
  SEARCH:
    CENTER_JITTER: 4.5
    FACTOR: 5.0
    SCALE_JITTER: 0.5
    SIZE: 256
    NUMBER: 1
  STD:
    - 0.229
    - 0.224
    - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 1

  TRAIN:
    DATASETS_NAME:
      - COCO17
      - GOT10K_train_full
    DATASETS_RATIO:
      - 1
      - 1
    SAMPLE_PER_EPOCH: 60000

  VAL:
    DATASETS_NAME:
      - GOT10K_votval
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 10000

MODEL:
  PRETRAIN_FILE: "mae_pretrain_vit_base.pth"
  IS_DISTILL: True
  TEACHER_TYPE: "sglatrack"
  TEACHER_PRETRAIN_FILE: "output/checkpoints/train/sglatrack/vit_coco_uav123_care_relu6/sglatrack_ep0050.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  RETURN_STAGES: []
  BACKBONE:
    TYPE: vit_base_patch16_224
    STRIDE: 16
    MID_PE: False
    SEP_SEG: False
    CAT_MODE: 'direct'
    MERGE_LAYER: 0
    ADD_CLS_TOKEN: False
    CLS_TOKEN_USE_MODE: 'ignore'
    CE_LOC: []
    CE_KEEP_RATIO: []
    CE_TEMPLATE_RANGE: 'ALL'
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 32
  EPOCH: 50
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 5e-5
  LR_BACKBONE: 5e-6
  LR_DROP_EPOCH: 40
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 5
  WEIGHT_DECAY: 0.0001
  AMP: False
  CE_START_EPOCH: 20
  CE_WARM_EPOCH: 80
  FREEZE_LAYERS: [0, 1, 2]
  # Feature distill: MSE(backbone_feat student vs teacher). AFKD_RHO>0 adds GIoU-based sample reweighting.
  # Plain / uniform distill: set AFKD_RHO: 0 and AFKD_TAU0: 1.0; tune strength with DISTILL_LOSS_WEIGHT only.
  DISTILL_LOSS_WEIGHT: 0.00002
  #AFKD_TAU0: 10.0
  #AFKD_RHO: 10.0
  AFKD_TAU0: 1.0
  AFKD_RHO: 0.0
  SIM_LOSS_WEIGHT: 0.0

TEST:
  EPOCH: 50
  SEARCH_FACTOR: 5.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
